<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Complete Mart</title>
    <script>
      // Redirect all 404s to index.html for HashRouter to handle
      var path = window.location.pathname;
      var repo = '/completemart';
      if (path.startsWith(repo)) {
        path = path.slice(repo.length);
      }
      window.location.replace(
        window.location.origin + repo + '/#' + path + window.location.search
      );
    </script>
  </head>
  <body></body>
</html>
